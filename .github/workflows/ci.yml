name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web Test/Lint/Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            packages/contracts/package-lock.json
            apps/web/package-lock.json

      - name: Install contracts dependencies
        run: npm --prefix packages/contracts ci

      - name: Install web dependencies
        run: npm --prefix apps/web ci

      - name: Run web tests
        run: npm --prefix apps/web run test

      - name: Run web lint
        run: npm --prefix apps/web run lint

      - name: Run web build
        run: npm --prefix apps/web run build

  sim:
    name: Sim Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            packages/contracts/package-lock.json
            apps/sim/package-lock.json

      - name: Install contracts dependencies
        run: npm --prefix packages/contracts ci

      - name: Install sim dependencies
        run: npm --prefix apps/sim ci

      - name: Run sim build
        run: npm --prefix apps/sim run build
